<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>rust_gomoku</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">
    <header id="titlebar">
      <span id="app-title">rust_gomoku</span>
      <div id="meta">
        <span class="chip" id="meta-rule">—</span>
        <span class="chip" id="meta-side">—</span>
        <span class="chip" id="meta-difficulty">困难</span>
        <span class="chip" id="meta-moves">第 0 手</span>
      </div>
    </header>
    <header id="statusbar">
      <span id="turn-dot" class="none" aria-hidden="true"></span>
      <span id="status-msg">准备连接引擎…</span>
    </header>
    <main id="board-area">
      <div id="board-wrap">
        <canvas id="board" aria-label="15路五子棋棋盘"></canvas>
      </div>
    </main>
    <nav id="actionbar">
      <button id="btn-undo" class="warn">悔棋</button>
      <button id="btn-newgame" class="primary">新局</button>
      <button id="btn-more">更多</button>
    </nav>
  </div>

  <!-- New game sheet -->
  <div class="sheet-backdrop" data-backdrop="newgame" aria-hidden="true"></div>
  <section class="sheet newgame-sheet" id="sheet-newgame" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-heading">
      <h2>开始新对局</h2>
      <button class="sheet-close" type="button" data-close="newgame" aria-label="关闭">×</button>
    </div>
    <div class="game-options">
      <div class="option-row">
        <label>执棋</label>
        <div class="segmented compact" id="opt-side">
          <button data-value="black" aria-pressed="true">执黑</button>
          <button data-value="white" aria-pressed="false">执白</button>
        </div>
      </div>
      <div class="option-row">
        <label>规则</label>
        <div class="segmented compact" id="opt-rule">
          <button data-value="freestyle" aria-pressed="true">无禁手</button>
          <button data-value="renju" aria-pressed="false">有禁手</button>
        </div>
      </div>
      <div class="option-row">
        <label>模式</label>
        <div class="segmented compact" id="opt-mode">
          <button data-value="base" aria-pressed="true">Base</button>
          <button data-value="fast" aria-pressed="false">Fast</button>
        </div>
      </div>
      <div class="option-row difficulty-row">
        <label>难度</label>
        <button id="opt-difficulty" class="option-link" type="button" data-value="hard">
          <span id="difficulty-summary">困难</span>
          <span class="chevron" aria-hidden="true"></span>
        </button>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="primary" id="btn-start">开始</button>
    </div>
  </section>

  <!-- Difficulty picker -->
  <div id="difficulty-backdrop" aria-hidden="true"></div>
  <section id="difficulty-dialog" role="dialog" aria-modal="true" aria-labelledby="difficulty-title" aria-hidden="true">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-heading">
      <h2 id="difficulty-title">选择难度</h2>
      <button class="sheet-close" type="button" id="btn-difficulty-close" aria-label="关闭">×</button>
    </div>
    <div id="difficulty-options">
      <button class="difficulty-option" type="button" data-value="easy" aria-pressed="false">
        <span class="strength-icon level-1" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span class="difficulty-copy"><strong>容易</strong><small>d2 / w10 · 无战术搜索</small></span>
        <span class="difficulty-check" aria-hidden="true">✓</span>
      </button>
      <button class="difficulty-option" type="button" data-value="normal" aria-pressed="false">
        <span class="strength-icon level-2" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span class="difficulty-copy"><strong>一般</strong><small>d4 / w20 · 无战术搜索</small></span>
        <span class="difficulty-check" aria-hidden="true">✓</span>
      </button>
      <button class="difficulty-option" type="button" data-value="advanced" aria-pressed="false">
        <span class="strength-icon level-3" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span class="difficulty-copy"><strong>进阶</strong><small>d6 / w30 · VCF / VCT</small></span>
        <span class="difficulty-check" aria-hidden="true">✓</span>
      </button>
      <button class="difficulty-option" type="button" data-value="hard" aria-pressed="true">
        <span class="strength-icon level-4" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span class="difficulty-copy"><strong>困难</strong><small>d8 / w40 · VCF / VCT</small></span>
        <span class="difficulty-check" aria-hidden="true">✓</span>
      </button>
    </div>
  </section>

  <!-- More / advanced sheet -->
  <div class="sheet-backdrop" data-backdrop="more" aria-hidden="true"></div>
  <section class="sheet" id="sheet-more" role="dialog" aria-modal="true" aria-hidden="true">
    <h2>更多</h2>
    <div class="toggle-row">
      <span>显示全部手数</span>
      <button id="opt-numbers" aria-pressed="false">关</button>
    </div>
    <details class="advanced">
      <summary>高级 / 引擎信息</summary>
      <div class="kv" id="adv-kv">
        <span class="k">分数</span><span class="v" data-adv="score">—</span>
        <span class="k">深度</span><span class="v" data-adv="depth">—</span>
        <span class="k">节点</span><span class="v" data-adv="nodes">—</span>
        <span class="k">思考耗时</span><span class="v" data-adv="ms">—</span>
        <span class="k">难度</span><span class="v" data-adv="difficulty">—</span>
      </div>
    </details>
    <div class="sheet-actions">
      <button data-close="more">关闭</button>
    </div>
  </section>

  <div id="result-backdrop" aria-hidden="true"></div>
  <section id="result-dialog" role="dialog" aria-modal="true" aria-labelledby="result-title" aria-hidden="true">
    <div id="result-mark" aria-hidden="true"></div>
    <h2 id="result-title">对局结束</h2>
    <p id="result-message"></p>
    <div class="result-actions">
      <button id="btn-result-close">查看棋盘</button>
      <button class="primary" id="btn-result-newgame">再来一局</button>
    </div>
  </section>

  <div id="toast" role="status"></div>

  <script src="ui_logic.js"></script>
  <script src="app.js"></script>
</body>
</html>
