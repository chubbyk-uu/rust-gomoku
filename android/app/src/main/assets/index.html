<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>rust_gomoku</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">
    <header id="titlebar">
      <span id="app-title">rust_gomoku</span>
      <div id="meta">
        <span class="chip" id="meta-rule">—</span>
        <span class="chip" id="meta-side">—</span>
        <span class="chip" id="meta-moves">第 0 手</span>
      </div>
    </header>
    <header id="statusbar">
      <span id="turn-dot" class="none" aria-hidden="true"></span>
      <span id="status-msg">准备连接引擎…</span>
    </header>
    <main id="board-area">
      <div id="board-wrap">
        <canvas id="board" aria-label="15路五子棋棋盘"></canvas>
      </div>
    </main>
    <nav id="actionbar">
      <button id="btn-undo" class="warn">悔棋</button>
      <button id="btn-newgame" class="primary">新局</button>
      <button id="btn-more">更多</button>
    </nav>
  </div>

  <!-- New game sheet -->
  <div class="sheet-backdrop" data-backdrop="newgame"></div>
  <section class="sheet" id="sheet-newgame" aria-hidden="true">
    <h2>新局</h2>
    <div class="field">
      <label>执棋</label>
      <div class="segmented" id="opt-side">
        <button data-value="black" aria-pressed="true">我执黑</button>
        <button data-value="white" aria-pressed="false">我执白</button>
      </div>
    </div>
    <div class="field">
      <label>规则</label>
      <div class="segmented" id="opt-rule">
        <button data-value="freestyle" aria-pressed="true">无禁手</button>
        <button data-value="renju" aria-pressed="false">有禁手</button>
      </div>
    </div>
    <div class="field">
      <label>模式</label>
      <div class="segmented" id="opt-mode">
        <button data-value="base" aria-pressed="true">Base</button>
        <button data-value="fast" aria-pressed="false">Fast</button>
      </div>
    </div>
    <div class="sheet-actions">
      <button data-close="newgame">取消</button>
      <button class="primary" id="btn-start">开始</button>
    </div>
  </section>

  <!-- More / advanced sheet -->
  <div class="sheet-backdrop" data-backdrop="more"></div>
  <section class="sheet" id="sheet-more" aria-hidden="true">
    <h2>更多</h2>
    <div class="toggle-row">
      <span>显示全部手数</span>
      <button id="opt-numbers" aria-pressed="false">关</button>
    </div>
    <details class="advanced">
      <summary>高级 / 引擎信息</summary>
      <div class="kv" id="adv-kv">
        <span class="k">分数</span><span class="v" data-adv="score">—</span>
        <span class="k">深度</span><span class="v" data-adv="depth">—</span>
        <span class="k">节点</span><span class="v" data-adv="nodes">—</span>
        <span class="k">思考耗时</span><span class="v" data-adv="ms">—</span>
      </div>
    </details>
    <div class="sheet-actions">
      <button data-close="more">关闭</button>
    </div>
  </section>

  <div id="toast" role="status"></div>

  <script src="app.js"></script>
</body>
</html>
