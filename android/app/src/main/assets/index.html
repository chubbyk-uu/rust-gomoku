<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>rust_gomoku</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #191714;
      --muted: #6a645c;
      --paper: #f3f1eb;
      --board: #d9a85f;
      --line: #33291d;
      --accent: #176b55;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }
    body {
      min-height: 100dvh;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
    }
    main {
      width: min(100%, 720px);
      display: grid;
      gap: 12px;
    }
    header {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    #status {
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }
    .board-shell {
      width: 100%;
      aspect-ratio: 1;
      padding: 8px;
      background: #fff;
      border: 1px solid #d6d1c7;
      border-radius: 8px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: var(--board);
      touch-action: manipulation;
    }
    @media (orientation: landscape) and (max-height: 600px) {
      body { place-items: stretch center; }
      main {
        width: min(100%, 980px);
        grid-template-columns: minmax(0, 1fr) 220px;
        align-items: start;
      }
      header {
        grid-column: 2;
        align-content: start;
        flex-direction: column;
        align-items: flex-start;
      }
      #status { text-align: left; }
      .board-shell {
        grid-column: 1;
        grid-row: 1;
        max-height: calc(100dvh - 24px);
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>rust_gomoku</h1>
      <div id="status">准备连接引擎</div>
    </header>
    <section class="board-shell">
      <canvas id="board" width="720" height="720" aria-label="15路五子棋棋盘"></canvas>
    </section>
  </main>
  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const margin = 42;
    const cell = (canvas.width - margin * 2) / 14;

    ctx.fillStyle = '#d9a85f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#33291d';
    ctx.lineWidth = 2;
    for (let i = 0; i < 15; i += 1) {
      const p = margin + i * cell;
      ctx.beginPath();
      ctx.moveTo(margin, p);
      ctx.lineTo(canvas.width - margin, p);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p, margin);
      ctx.lineTo(p, canvas.height - margin);
      ctx.stroke();
    }
    for (const [x, y] of [[3, 3], [11, 3], [7, 7], [3, 11], [11, 11]]) {
      ctx.beginPath();
      ctx.arc(margin + x * cell, margin + y * cell, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#33291d';
      ctx.fill();
    }
  </script>
</body>
</html>
